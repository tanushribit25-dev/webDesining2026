<!DOCTYPE html>
<html>
    <hed>
        <title>Scolarship / seminar Registration Form</title>
    </hed>
    <body>
        <h2>Scolarship / seminar Registration Form </h2>
        <form>
            <!-- Personal Information-->
             <fieldset>
                <legend>Personal Information</legend>
                <label>Full Name:</label>
                <input type="text" name="fullname"><br><br>
                <label>Email:</label>
                <input type="email" name="email"><br><br>
                <label>Phone Number:</label>
                <input type="tel" name="phone"><br><br>
                <label>Gender:</label>
                <input type="radio" name="gender" value="male"> Male 
                <input type="radio" name="gender" value="female"> Female 
                <input type="radio" name="gemder" value="other"> Other
             </fieldset>
             <br>
             <!--Academic Information -->
             <fieldset>
                <legend>Academic Details</legend>
                <label>Cource:</label>
                <select name="cource">
                    <option value="">--select cource</option>
                    <option value="btech">B.Tech</option>
                    <option value="bsc">B.Sc</option>
                    <option value="bca">BCA</option>
                    <option value="mca">MCA</option>
                    <option value="msc">M.Sc</option>
                </select>
                <br><br>
                <label>Year of Study:</label>
                <select name="year">
                    <option>1st year</option>
                    <option>2nd year</option>
                    <option>3rd year</option>
                    <option>4rt year</option>
                    </select>
             </fieldset>
             <br>
             <!-- Seminar Pereferences -->
              <fieldset>
                <legend>Seminar Topics Intrested In</legend>
                <input type="checkbox" name="topic" value="ai"> Artificial Inteligence<br>
                <input type="checkbox" name="topic" value="web"> Web Devlopment<br>
                <input type="checkbox" name="topic" value="cyber"> cyber Security<br>
                <input typr="checkbox" name="topic" value="data"> Data Science
               </fieldset>
               <br>
               <input type="submit" value="Register>
               <input type="reset" value="Clear">
               </form>
    </body>
    </html>
